# GitHub Actions — Your First Secure CI/CD Pipeline
# Save this as .github/workflows/secure-pipeline.yml in your repo

name: Secure DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Stage 1: Security Scanning
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run secret scanner
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

      - name: Run dependency check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'my-app'
          path: '.'
          format: 'HTML'

  # Stage 2: Build
  build:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t my-app:${{ github.sha }} .

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'my-app:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  # Stage 3: Test
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run unit tests
        run: echo "Running tests..."  # Replace with actual test command

      - name: Run OWASP ZAP (DAST)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://localhost:8080'
          allow_issue_writing: false

  # Stage 4: Deploy (only on main branch)
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy to staging
        run: echo "Deploying to staging..."

      - name: Run smoke tests
        run: echo "Running smoke tests..."

      - name: Deploy to production
        run: echo "Deploying to production..."
